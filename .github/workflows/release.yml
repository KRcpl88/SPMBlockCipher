name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build:
    uses: ./.github/workflows/build.yml
    permissions:
      contents: read

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download .NET artifact
        uses: actions/download-artifact@v4
        with:
          name: SpmBlockCipher-dotnet-win-x64
          path: artifacts/dotnet

      - name: Download C++ artifact
        uses: actions/download-artifact@v4
        with:
          name: SpmBlockCipher-cpp-win-x64
          path: artifacts/cpp

      - name: Package artifacts
        run: |
          cd artifacts
          zip -r SpmBlockCipher-dotnet-win-x64.zip dotnet/
          cp cpp/SpmBlockCipher64.exe SpmBlockCipher64-cpp-win-x64.exe

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes \
            artifacts/SpmBlockCipher-dotnet-win-x64.zip \
            artifacts/SpmBlockCipher64-cpp-win-x64.exe
