name: Release

on:
  push:
    tags:
      - 'v*'
      - '[0-9]*.[0-9]*.[0-9]*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build and upload binaries for (e.g. v1.0.00)'
        required: true

permissions:
  contents: read

jobs:
  release:
    name: Build and Create GitHub Release
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Resolve tag
        id: tag
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            echo "value=${{ github.event.inputs.tag }}" >> $env:GITHUB_OUTPUT
          } else {
            echo "value=${{ github.ref_name }}" >> $env:GITHUB_OUTPUT
          }

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.value }}

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: |
          dotnet restore SpmCryptNet/SpmBlockCipherNet.csproj
          dotnet restore SpmCryptNetTests/SpmBlockCipherNetTests.csproj

      - name: Build
        run: dotnet build SpmCryptNet/SpmBlockCipherNet.csproj --configuration Release --no-restore

      - name: Test
        run: dotnet test SpmCryptNetTests/SpmBlockCipherNetTests.csproj --configuration Release --no-restore

      - name: Publish win-x64
        run: >
          dotnet publish SpmCryptNet/SpmBlockCipherNet.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishDir=${{ github.workspace }}/artifacts/dotnet/

      - name: Package artifacts
        run: Compress-Archive -Path ${{ github.workspace }}/artifacts/dotnet/SpmBlockCipher64.* -DestinationPath ${{ github.workspace }}/artifacts/SpmBlockCipher-dotnet-win-x64.zip

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $tag = "${{ steps.tag.outputs.value }}"
          $exists = gh release view $tag --repo ${{ github.repository }} 2>&1
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag ${{ github.workspace }}/artifacts/SpmBlockCipher-dotnet-win-x64.zip `
              --repo ${{ github.repository }} --clobber
          } else {
            gh release create $tag `
              --title "Release $tag" `
              --generate-notes `
              ${{ github.workspace }}/artifacts/SpmBlockCipher-dotnet-win-x64.zip
          }
