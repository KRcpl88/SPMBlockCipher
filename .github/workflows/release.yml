name: Release

on:
  push:
    tags:
      - 'v*'
      - '[0-9]*'

permissions:
  contents: read

jobs:
  build:
    uses: ./.github/workflows/build.yml
    permissions:
      contents: read

  release:
    name: Create GitHub Release
    needs: build
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download .NET artifact
        uses: actions/download-artifact@v4
        with:
          name: SpmBlockCipher-dotnet-win-x64
          path: artifacts/dotnet

      - name: Package artifacts
        run: |
          Compress-Archive -Path artifacts/dotnet/* -DestinationPath artifacts/SpmBlockCipher-dotnet-win-x64.zip

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" `
            --title "Release ${{ github.ref_name }}" `
            --generate-notes `
            artifacts/SpmBlockCipher-dotnet-win-x64.zip
